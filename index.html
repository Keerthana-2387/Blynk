<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 Camera Controller</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        #webcam-container { margin: 20px auto; border-radius: 15px; overflow: hidden; border: 4px solid #00ff88; width: 224px; height: 224px; background: #333; }
        button { padding: 20px; width: 100%; max-width: 300px; font-size: 20px; font-weight: bold; cursor: pointer; background: #00ff88; color: black; border: none; border-radius: 10px; margin-bottom: 20px; }
        #log { font-family: monospace; font-size: 12px; color: #aaa; text-align: left; background: #000; padding: 10px; border-radius: 5px; height: 100px; overflow-y: scroll; margin-top: 20px; }
        .label { font-size: 24px; margin: 10px; color: #00ff88; }
    </style>
</head>
<body>

    <h2>AI Control Center</h2>
    <button type="button" id="start-btn" onclick="init()">TAP TO START CAMERA</button>
    
    <div id="webcam-container"></div>
    <div id="label-container" class="label">Ready...</div>
    
    <div id="log">System Logs:<br></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // --- YOUR CONFIG ---
        const URL = "https://teachablemachine.withgoogle.com/models/YOUR_ID/"; 
        const BLYNK_TOKEN = "YOUR_TOKEN"; 
        // -------------------

        let model, webcam, labelContainer, maxPredictions;
        let lastValue = -1;

        function info(msg) {
            document.getElementById("log").innerHTML += "> " + msg + "<br>";
            console.log(msg);
        }

        async function init() {
            info("Loading libraries...");
            document.getElementById("start-btn").style.display = "none";

            try {
                // 1. Load Model
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
                info("Model Loaded!");

                // 2. Setup Webcam (Mobile specific constraints)
                const flip = true;
                webcam = new tmImage.Webcam(224, 224, flip);
                
                info("Requesting Camera...");
                await webcam.setup({ facingMode: "user" }); // Force front camera for selfie mode
                
                // 3. Play and Bind
                await webcam.play();
                info("Camera Playing!");
                
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                
                window.requestAnimationFrame(loop);
            } catch (err) {
                info("CRITICAL ERROR: " + err);
                document.getElementById("start-btn").style.display = "block";
                document.getElementById("start-btn").innerHTML = "RETRY CAMERA";
                alert("Please check: Settings > Safari/Chrome > Camera > Allow");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let currentValue = prediction[0].probability > 0.85 ? 1 : 0;

            if (currentValue !== lastValue) {
                lastValue = currentValue;
                // Blynk Update
                fetch(`https://blynk.cloud/external/api/update?token=${BLYNK_TOKEN}&v1=${currentValue}`, {mode: 'no-cors'})
                .then(() => info("Blynk Updated: " + currentValue));
            }

            labelContainer.innerHTML = prediction[0].className + ": " + (prediction[0].probability * 100).toFixed(0) + "%";
        }
    </script>
</body>
</html>
