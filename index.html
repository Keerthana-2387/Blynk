<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM to Blynk</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        #webcam-container { margin: 20px auto; border: 5px solid #333; width: 200px; height: 200px; background: #ccc; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #label-container { margin-top: 20px; font-weight: bold; font-size: 20px; }
        #status { color: red; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Teachable Machine + Blynk</h2>
    
    <button type="button" onclick="init()">START CAMERA</button>
    
    <div id="status">Status: Waiting for user...</div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // --- CONFIGURATION ---
        const URL = "https://teachablemachine.withgoogle.com/models/YOUR_ID/"; // Update this!
        const BLYNK_TOKEN = "YOUR_TOKEN"; // Update this!
        // ---------------------

        let model, webcam, labelContainer, maxPredictions;
        let lastValue = -1;

        async function init() {
            const status = document.getElementById("status");
            status.innerHTML = "Status: Loading Model...";
            status.style.color = "blue";

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // Load model
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // Setup webcam
                status.innerHTML = "Status: Accessing Camera...";
                webcam = new tmImage.Webcam(200, 200, true); 
                
                // For mobile, we request the camera and wait
                await webcam.setup({ facingMode: "user" }); 
                await webcam.play();
                
                status.innerHTML = "Status: Running!";
                status.style.color = "green";

                window.requestAnimationFrame(loop);

                // Append to DOM
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = "Error: " + err.message;
                status.style.color = "red";
                alert("Camera error. Make sure you are on HTTPS and allowed permissions.");
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            // Logic: if class 0 is > 90%
            let currentValue = prediction[0].probability > 0.9 ? 1 : 0;

            if (currentValue !== lastValue) {
                lastValue = currentValue;
                // Send to Blynk
                fetch(`https://blynk.cloud/external/api/update?token=${BLYNK_TOKEN}&v1=${currentValue}`, {mode: 'no-cors'});
            }

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
